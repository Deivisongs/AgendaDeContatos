<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260629" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260629" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260629" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260629" />
    <meta name="apple-mobile-web-app-title" content="FastColetor" />
    <link rel="manifest" href="/site.webmanifest?v=20260629" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Minhas Coletas - Inventário</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #3a3a3a;
            --bg-light: #edf2f7;
            --primary-blue: #00aced;
            --text-dark: #1a1a1a;
            --danger-red: #e74c3c;
            --warning-orange: #f39c12;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f0f4f8;
        }

        .app-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* --- HEADER FIXO --- */
        .header {
            background-color: var(--bg-dark);
            color: #fff;
            padding: 0 15px;
            display: flex;
            align-items: center;
            height: 60px;
            user-select: none;
            flex-shrink: 0;
        }

        .header-back-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            padding: 5px 10px;
        }

        .header-title {
            flex: 1;
            text-align: center;
            font-size: 1.2rem;
            font-weight: bold;
            margin-right: 35px;
        }

        /* --- SUBHEADER FIXO --- */
        .balance-meta {
            background-color: #fff;
            text-align: center;
            padding: 12px 10px;
            border-bottom: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
            flex-shrink: 0;
        }

        .meta-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
        }

        .meta-date {
            font-size: 0.8rem;
            color: #555;
            margin-top: 3px;
        }

        /* --- LISTA COM SCROLL EXCLUSIVO --- */
        .coletas-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px;
            background-color: #f0f4f8;
            -webkit-overflow-scrolling: touch;
        }

        .coleta-item {
            background-color: transparent;
            border-bottom: 1px solid #cbd5e1;
            padding: 14px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }

        .coleta-item:hover {
            background-color: rgba(0, 172, 237, 0.03);
        }

        .coleta-info .coleta-code {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-dark);
        }

        .coleta-info .coleta-time {
            font-size: 0.75rem;
            color: #777;
            margin-top: 4px;
        }

        .coleta-qty-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .coleta-qty {
            font-size: 1.1rem;
            font-weight: 800;
            color: var(--text-dark);
        }

        .btn-delete-item {
            background: none;
            border: none;
            color: var(--danger-red);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 5px;
            z-index: 10;
        }

        /* --- FOOTER FIXO --- */
        .footer-controls {
            background-color: #fff;
            border-top: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            gap: 15px;
            flex-shrink: 0;
        }

        .action-buttons-row {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
        }

        .camera-btn {
            background-color: var(--bg-dark);
            color: var(--primary-blue);
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .keyboard-btn {
            background-color: #e2e8f0;
            color: var(--bg-dark);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            border: none;
            cursor: pointer;
            box-shadow: 0 3px 6px rgba(0,0,0,0.1);
        }

        .btn-finish {
            width: 100%;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 15px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 172, 237, 0.2);
            border-radius: 5px;
        }

        /* --- MODAIS --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: white;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            overflow: hidden;
        }

        .modal-header-bar {
            padding: 15px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background-color 0.2s ease;
        }

        .modal-header-bar.default {
            background-color: #ffffff;
            color: var(--text-dark);
        }

        .modal-header-bar.warning {
            background-color: var(--warning-orange);
            color: #ffffff;
        }

        .modal-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .badge-already-scanned {
            background-color: #fff;
            color: var(--warning-orange);
            font-size: 0.75rem;
            font-weight: 800;
            padding: 4px 8px;
            text-transform: uppercase;
            border-radius: 3px;
            display: none;
            animation: pulse-badge 1.5s infinite;
        }

        @keyframes pulse-badge {
            0% { opacity: 0.6; }
            50% { opacity: 1; }
            100% { opacity: 0.6; }
        }

        .modal-body {
            padding: 20px;
        }

        .product-detail-row {
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .product-detail-row strong {
            color: #555;
        }
        
        .modal-body .product-detail-row strong {
            color: #4a5568;
        }

        .form-group {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 0.85rem;
            font-weight: bold;
            color: #444;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            outline: none;
            border-radius: 4px;
        }

        .modal-actions {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        .btn-modal {
            flex: 1;
            padding: 12px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
        }

        .btn-modal-save { background-color: var(--primary-blue); color: white; }
        .btn-modal-cancel { background-color: #e2e8f0; color: #4a5568; }

        #videoContainer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: black;
            z-index: 90;
            display: none;
        }

        #videoPreview { width: 100%; height: 100%; object-fit: cover; }
        .close-scanner-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: rgba(0,0,0,0.6);
            color: white;
            border: none;
            padding: 10px 15px;
            font-weight: bold;
            cursor: pointer;
            z-index: 95;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div id="videoContainer">
            <button class="close-scanner-btn" id="btnCloseScanner">Fechar X</button>
            <video id="videoPreview" autoplay playsinline></video>
        </div>

        <header class="header">
            <button class="header-back-btn" id="btnHeaderBack"><i class="fa-solid fa-chevron-left"></i></button>
            <div class="header-title">minhas coletas</div>
        </header>

        <div class="balance-meta">
            <div class="meta-title" id="lblBalanceName"></div>
            <div class="meta-date" id="lblBalanceDate"></div>
        </div>

        <main class="coletas-list" id="coletasContainer"></main>

        <footer class="footer-controls">
            <div class="action-buttons-row">
                <button class="keyboard-btn" id="btnManualInput" title="Digitar Código">
                    <i class="fa-solid fa-keyboard"></i>
                </button>
                <button class="camera-btn" id="btnScan" title="Escanear Código">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>
            <button class="btn-finish" id="btnFinish">Encerrar</button>
        </footer>

        <div class="modal-overlay" id="modalProductFound">
            <div class="modal-content">
                <div class="modal-header-bar default" id="headModalFound">
                    <div class="modal-title" id="titleModalFound">Produto Encontrado</div>
                    <span class="badge-already-scanned" id="badgeDuplicate">Já Coletado</span>
                </div>
                
                <div class="modal-body">
                    <div class="product-detail-row"><strong>Código:</strong> <span id="fndCode">-</span></div>
                    <div class="product-detail-row"><strong>Descrição:</strong> <span id="fndDesc">-</span></div>
                    <div class="product-detail-row"><strong>Preço:</strong> R$ <span id="fndPrice">-</span></div>
                    <div class="product-detail-row"><strong>Estoque Atual:</strong> <span id="fndStock">-</span></div>
                    
                    <div class="form-group">
                        <label for="fndQtyApurada">Quantidade Apurada</label>
                        <input type="number" id="fndQtyApurada" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label for="fndLocalizacao">Localização Física</label>
                        <input type="text" id="fndLocalizacao" placeholder="Ex: Corredor A, Prateleira 2">
                    </div>

                    <div class="modal-actions">
                        <button class="btn-modal btn-modal-cancel" id="btnCancelFound">Cancelar</button>
                        <button class="btn-modal btn-modal-save" id="btnSaveFound">Salvar Contagem</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="modal-overlay" id="modalProductNotFound">
            <div class="modal-content">
                <div class="modal-header-bar default" style="border-bottom: 1px solid #e2e8f0;">
                    <div class="modal-title" id="titleModalNotFound" style="color: var(--danger-red);">Código Não Encontrado</div>
                </div>
                
                <div class="modal-body">
                    <div class="product-detail-row"><strong>Código Lido:</strong> <span id="nfndCode">-</span></div>
                    
                    <div class="form-group">
                        <label for="nfndDesc">Descrição (Opcional)</label>
                        <input type="text" id="nfndDesc" placeholder="Ex: Produto Desconhecido">
                    </div>

                    <div class="form-group">
                        <label for="nfndRef">Referência *</label>
                        <input type="text" id="nfndRef" placeholder="Ex: REF-123">
                    </div>

                    <div class="form-group">
                        <label for="nfndQty">Quantidade Apurada *</label>
                        <input type="number" id="nfndQty" value="1" min="1">
                    </div>

                    <div class="form-group">
                        <label for="nfndLocalizacao">Localização Física</label>
                        <input type="text" id="nfndLocalizacao" placeholder="Ex: Corredor A, Prateleira 2">
                    </div>

                    <div class="modal-actions">
                        <button class="btn-modal btn-modal-cancel" id="btnCancelNotFound">Cancelar</button>
                        <button class="btn-modal btn-modal-save" id="btnSaveNotFound">Salvar Produto</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="db.js"></script>
    <script src="coleta.js"></script>
</body>
</html>
