<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <link rel="icon" type="image/png" href="/favicon-96x96.png?v=20260629" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=20260629" />
    <link rel="shortcut icon" href="/favicon.ico?v=20260629" />
    <link class="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260629" />
    <meta name="apple-mobile-web-app-title" content="FastColetor" />
    <link rel="manifest" href="/site.webmanifest?v=20260629" />

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Coletor de Dados - Inventário</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #333333;
            --bg-light: #f4f7fc;
            --primary-blue: #00aced;
            --text-dark: #2d3748;
            --card-text-blue: #0288d1;
            --success-green: #48bb78;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-light);
        }

        /* Ocupa o tamanho exato e total disponível da tela, sem arredondamentos */
        .app-container {
            width: 100%;
            height: 100%;
            background-color: #f8fafc;
            position: relative;
            display: flex;
            flex-direction: column;
        }

        /* --- TOPO --- */
        .header {
            background-color: var(--bg-dark);
            color: #fff;
            padding: 20px 20px 60px 20px;
            text-align: center;
            position: relative;
            clip-path: ellipse(80% 60% at 50% 40%);
            flex-shrink: 0;
        }

        .header-top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.4rem;
            margin-bottom: 20px;
        }

        .header-top-bar i {
            cursor: pointer;
            padding: 5px;
        }

        .logo-area {
            margin-top: 10px;
            user-select: none;
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--primary-blue);
            letter-spacing: -2px;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #ccc;
            margin-top: 5px;
            font-weight: 500;
        }

        /* --- CONTEÚDO CENTRAL --- */
        .main-content {
            flex: 1;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: -30px;
            z-index: 2;
        }

        .promo-card {
            background-color: #fff;
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            padding: 25px;
            position: relative;
            overflow: hidden;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background-image: linear-gradient(rgba(255,255,255,0.85), rgba(255,255,255,0.85)), url('https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?q=80&w=500');
            background-size: cover;
            background-position: center;
            user-select: none;
        }

        .card-layout {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-circle {
            width: 75px;
            height: 75px;
            border: 12px solid var(--primary-blue);
            border-radius: 50%;
            flex-shrink: 0;
            position: relative;
        }
        
        .icon-circle::after {
            content: '';
            position: absolute;
            right: -10px;
            top: 15px;
            border-width: 8px 0 8px 10px;
            border-style: solid;
            border-color: transparent transparent transparent var(--primary-blue);
        }

        .card-text {
            color: var(--card-text-blue);
            font-size: 1.05rem;
            font-weight: 600;
            line-height: 1.4;
        }

        .card-footer-logo {
            position: absolute;
            bottom: 15px;
            right: 15px;
            font-size: 0.9rem;
            font-weight: bold;
            color: var(--primary-blue);
            opacity: 0.7;
        }

        /* --- BARRA DE NAVEGAÇÃO INFERIOR --- */
        .bottom-nav {
            background-color: #fff;
            border-top: 1px solid #e2e8f0;
            height: 65px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            position: relative;
            flex-shrink: 0;
            user-select: none;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--bg-dark);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            gap: 4px;
            flex: 1;
            height: 100%;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item.active {
            color: #000000;
        }

        /* Botão Flutuante Central */
        .nav-camera-wrapper {
            position: relative;
            top: -15px;
            width: 70px;
            height: 70px;
            z-index: 10;
        }

        .nav-camera-btn {
            background-color: var(--bg-dark);
            color: var(--primary-blue);
            width: 100%;
            height: 100%;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            border: 4px solid var(--bg-light);
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.15);
        }

        /* --- ESTRUTURA DOS MODAIS --- */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background-color: #fff;
            width: 100%;
            border-top-left-radius: 25px;
            border-top-right-radius: 25px;
            padding: 25px 20px;
            transform: translateY(100%);
            transition: transform 0.25s ease;
            max-height: 85%;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay.active .modal-content {
            transform: translateY(0);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .close-modal-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #999;
            cursor: pointer;
            padding: 5px;
        }

        .btn-new-balance {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(100, 155, 255, 0.2);
        }

        .section-divider {
            font-size: 0.85rem;
            color: #888;
            text-transform: uppercase;
            font-weight: bold;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .balance-list {
            overflow-y: auto;
            flex: 1;
            padding-right: 5px;
            -webkit-overflow-scrolling: touch;
        }

        .balance-item {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background-color 0.15s;
        }

        .balance-item:hover {
            background-color: #edf2f7;
            border-color: var(--primary-blue);
        }

        .balance-info .balance-name {
            font-weight: 600;
            color: #333;
        }

        .balance-info .balance-date {
            font-size: 0.8rem;
            color: #777;
            margin-top: 2px;
        }

        .balance-badge {
            background-color: #e2e8f0;
            color: #4a5568;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: bold;
        }
        
        .balance-badge.open {
            background-color: rgba(0, 172, 237, 0.15);
            color: var(--card-text-blue);
        }

        /* --- FORMULÁRIO (MODAL 2) --- */
        .form-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: #555;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--primary-blue);
        }

        .btn-submit-form {
            background-color: var(--primary-blue);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            box-shadow: 0 4px 10px rgba(0, 172, 237, 0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        /* --- MENU LATERAL (SIDEBAR) --- */
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 280px;
            height: 100%;
            background-color: #fff;
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.25s ease-in-out;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.1);
        }

        .sidebar.active {
            transform: translateX(0);
        }

        .sidebar-header {
            background-color: var(--bg-dark);
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sidebar-title {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .close-sidebar-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #ccc;
            cursor: pointer;
            padding: 5px;
        }

        .sidebar-content {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        .sidebar-btn {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 14px;
            border-radius: 10px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-dark);
            text-align: left;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .sidebar-btn i {
            color: var(--primary-blue);
            font-size: 1.2rem;
            width: 24px;
            text-align: center;
        }

        .sidebar-btn:hover, .sidebar-btn:active {
            background-color: #edf2f7;
            border-color: var(--primary-blue);
        }

        /* Fundo escurecido atrás do Menu */
        .sidebar-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 199;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease;
        }

        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <header class="header">
            <div class="header-top-bar">
                <i class="fa-solid fa-bars" id="asideBar"></i>
                
                <i class="fa-solid fa-right-from-bracket" id="logoutBtn"></i>
            </div>
            <div class="logo-area">
                <div class="logo-text">tgd</div>
                <div class="subtitle">coletor de dados</div>
            </div>
        </header>

        <div class="sidebar-overlay" id="sidebarOverlay"></div>
        <aside class="sidebar" id="sidebarMenu">
            <div class="sidebar-header">
                <h3 class="sidebar-title">Menu Principal</h3>
                <button class="close-sidebar-btn" id="closeSidebar">&times;</button>
            </div>
            <div class="sidebar-content">
                <button class="sidebar-btn" onclick="location.href='pedidos.html'">
                    <i class="fa-solid fa-boxes-packing"></i> Meus Pedidos
                </button>
                <button class="sidebar-btn" id="avariasMenuBtn">
                    <i class="fa-solid fa-square-plus"></i> Lançar Avaria
                </button>
                <button class="sidebar-btn" onclick="location.href='minhasAvarias.html'">
                    <i class="fa-solid fa-file-circle-exclamation"></i> Minhas Avarias
                </button>
            </div>
        </aside>

        <main class="main-content">
            <div class="promo-card">
                <div class="card-layout">
                    <div class="icon-circle"></div>
                    <div class="card-text">
                        Automatize processos, reduza custos e aumente a produtividade.
                    </div>
                </div>
                <div class="card-footer-logo">tgd</div>
            </div>
        </main>

        <footer class="bottom-nav">
            <div class="nav-item active" id="menuBtn" onclick="location.href='consulta.html'">
                <i class="fa-solid fa-barcode"></i>
                <span>Consulta</span>
            </div>

            <div class="nav-camera-wrapper">
                <button class="nav-camera-btn" id="cameraBtn">
                    <i class="fa-solid fa-camera"></i>
                </button>
            </div>

            <div class="nav-item" id="balancoBtn" onclick="location.href='meuBalanco.html'">
                <i class="fa-solid fa-file-invoice"></i>
                <span>meu balanço</span>
            </div>
        </footer>

        <div class="modal-overlay" id="balanceModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Selecione um balanço</h3>
                    <button class="close-modal-btn" id="closeModal">&times;</button>
                </div>

                <button class="btn-new-balance" id="btnNewBalance">
                    <i class="fa-solid fa-plus"></i> Criar Novo Balanço
                </button>

                <div class="section-divider">Balanços Anteriores</div>

                <div class="balance-list" id="balance-list"></div>
            </div>
        </div>

        <div class="modal-overlay" id="newBalanceFormModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Novo Inventário</h3>
                    <button class="close-modal-btn" id="closeFormModal">&times;</button>
                </div>

                <div class="form-group">
                    <label for="inputBalanceName">Nome do Balanço</label>
                    <input type="text" id="inputBalanceName" placeholder="Ex: Estoque TI - Setor A">
                </div>

                <div class="form-group">
                    <label for="inputOperatorName">Nome do Usuário / Operador</label>
                    <input type="text" id="inputOperatorName" placeholder="Ex: Operador 01">
                </div>

                <button class="btn-submit-form" id="btnConfirmNewBalance">
                    Iniciar Contagem <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>


        <div class="modal-overlay" id="avariasModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Selecione uma avaria</h3>
                    <button class="close-modal-btn" id="closeAvariasModal">&times;</button>
                </div>

                <button class="btn-new-balance" id="btnNewAvaria" style="background-color: var(--bg-dark);">
                    <i class="fa-solid fa-plus"></i> Registrar Nova Avaria
                </button>

                <div class="section-divider">Registros Anteriores</div>

                <div class="balance-list" id="avarias-list">
                    </div>
            </div>
        </div>

        <div class="modal-overlay" id="newAvariaFormModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3 class="modal-title">Nova Avaria</h3>
                    <button class="close-modal-btn" id="closeAvariaFormModal">&times;</button>
                </div>

                <div class="form-group">
                    <label for="inputAvariaLoja">Loja</label>
                    <input type="text" id="inputAvariaLoja" placeholder="Ex: Loja Matriz 01">
                </div>

                <div class="form-group">
                    <label for="inputAvariaOperator">Nome do Usuário / Operador</label>
                    <input type="text" id="inputAvariaOperator" placeholder="Ex: Operador 01">
                </div>

                <button class="btn-submit-form" id="btnConfirmNewAvaria" style="background-color: var(--bg-dark);">
                    Iniciar Registro <i class="fa-solid fa-arrow-right"></i>
                </button>
            </div>
        </div>

    </div>
    <script src="db.js"></script>
    <script src="app.js"></script>
</body>
</html>
