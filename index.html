<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Código de Barras Ultra-Sensível</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Container do Scanner */
        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 320px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* TRUQUE DE FILTRO: Força aumento de contraste e nitidez no vídeo da câmera */
        #scanner-container video, 
        #scanner-container canvas.drawingBuffer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            filter: contrast(140%) brightness(95%) saturate(0%);
        }

        /* Linha vermelha guia de mira centralizada */
        .scanner-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 3px;
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Sombras para indicar visualmente a área restrita de leitura */
        .scanner-overlay-top, .scanner-overlay-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 35%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 5;
            pointer-events: none;
        }
        .scanner-overlay-top { top: 0; border-bottom: 1px dashed rgba(255,255,255,0.3); }
        .scanner-overlay-bottom { bottom: 0; border-top: 1px dashed rgba(255,255,255,0.3); }

        /* Container de resultados */
        #resultado {
            margin-top: 20px;
            width: 100%;
            max-width: 480px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .code-output {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2e7d32;
            word-break: break-all;
        }

        .dica {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h2>Leitor Avançado (Códigos Difíceis)</h2>
    
    <div id="scanner-container">
        <div class="scanner-overlay-top"></div>
        <div class="scanner-laser"></div>
        <div class="scanner-overlay-bottom"></div>
    </div>

    <div id="resultado">
        <p>Centralize o código de barras na linha vermelha</p>
        <div class="code-output" id="barcode-result">---</div>
        <p class="dica">
            <strong>Dicas para códigos apagados:</strong><br>
            1. Mantenha o celular parado a cerca de 25 cm.<br>
            2. Evite reflexos diretos de lâmpadas nas barras.
        </p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const resultElement = document.getElementById('barcode-result');
            let lastResult = null;
            let countSameResult = 0;

            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#scanner-container'),
                    constraints: {
                        width: { min: 640, ideal: 1280 },
                        height: { min: 480, ideal: 720 },
                        facingMode: "environment",
                        advanced: [{ focusMode: "continuous" }] 
                    },
                },
                // Restringe a leitura estritamente para a faixa central de 30% da tela
                area: { 
                    top: "35%",    
                    bottom: "35%", 
                    left: "0%",
                    right: "0%"
                },
                locator: {
                    patchSize: "large", // 'large' ajuda o algoritmo a rastrear códigos fracos/apagados
                    halfSample: false   // Mantém a resolução máxima para não perder detalhes finos
                },
                numOfWorkers: navigator.hardwareConcurrency || 4,
                decoder: {
                    readers: [
                        "ean_reader",      
                        "ean_8_reader",    
                        "code_128_reader", 
                        "code_39_reader"   
                    ],
                    multiple: false
                },
                locate: true 
            }, function(err) {
                if (err) {
                    console.error("Erro Quagga:", err);
                    resultElement.innerText = "Erro ao acessar a câmera.";
                    return;
                }
                console.log("Quagga iniciado com modo de alta sensibilidade.");
                Quagga.start();
            });

            // Captura e validação
            Quagga.onDetected((data) => {
                const code = data.codeResult.code;

                if (code === lastResult) {
                    countSameResult++;
                } else {
                    lastResult = code;
                    countSameResult = 0;
                }

                // Exige 2 confirmações consecutivas para evitar falsos positivos
                if (countSameResult >= 2) {
                    resultElement.innerText = code;
                    
                    // Feedback visual de sucesso
                    const container = document.getElementById('scanner-container');
                    container.style.borderColor = '#2e7d32';
                    setTimeout(() => container.style.borderColor = '#333', 500);
                }
            });

            // Linhas verdes de rastreamento (ajustadas para respeitar o filtro e a área)
            Quagga.onProcessed((result) => {
                const drawingCtx = Quagga.canvas.ctx.overlay;
                const drawingCanvas = Quagga.canvas.dom.overlay;

                if (result) {
                    if (result.boxes) {
                        drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
                        result.boxes.filter(box => box !== result.box).forEach(box => {
                            Quagga.ImageDebug.drawPath(box, { x: 0, y: 1 }, drawingCtx, { color: "green", lineWidth: 2 });
                        });
                    }

                    if (result.box) {
                        Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: "#2e7d32", lineWidth: 2 });
                    }

                    if (result.codeResult && result.codeResult.code) {
                        Quagga.ImageDebug.drawPath(result.line, { x: 'x', y: 'y' }, drawingCtx, { color: 'red', lineWidth: 3 });
                    }
                }
            });
        });
    </script>
</body>
</html>
