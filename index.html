<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Código de Barras - Quagga2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
            text-align: center;
        }

        /* Container do Scanner */
        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 320px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* O Quagga injeta a tag <video> e <canvas> aqui dentro automaticamente */
        #scanner-container video, 
        #scanner-container canvas.drawingBuffer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Linha vermelha guia de mira (CSS Puro) */
        .scanner-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: red;
            box-shadow: 0 0 8px red;
            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Container de resultados */
        #resultado {
            margin-top: 20px;
            width: 100%;
            max-width: 480px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .code-output {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2e7d32;
            word-break: break-all;
        }

        .dica {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
        }
    </style>
</head>
<body>

    <h2>Leitor de Código de Barras (Quagga2)</h2>
    
    <div id="scanner-container">
        <div class="scanner-laser"></div>
    </div>

    <div id="resultado">
        <p>Aponte para um código de barras comercial</p>
        <div class="code-output" id="barcode-result">---</div>
        <p class="dica">Dica: Afaste o celular cerca de 20 a 30 cm do produto para focar melhor.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            
            const resultElement = document.getElementById('barcode-result');
            let lastResult = null;
            let countSameResult = 0;

            // Inicializando o Quagga2 com ajustes de alta resolução e foco contínuo
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#scanner-container'),
                    constraints: {
                        // Resolução HD para linhas nítidas
                        width: { min: 640, ideal: 1280 },
                        height: { min: 480, ideal: 720 },
                        facingMode: "environment",
                        // Tenta forçar o foco automático contínuo do aparelho
                        advanced: [{ focusMode: "continuous" }] 
                    },
                },
                locator: {
                    patchSize: "medium", 
                    halfSample: false // Desativado para manter a nitidez máxima da imagem
                },
                numOfWorkers: navigator.hardwareConcurrency || 4, // Usa mais processamento paralelo
                decoder: {
                    readers: [
                        "ean_reader",      
                        "ean_8_reader",    
                        "code_128_reader", 
                        "code_39_reader"   
                    ],
                    multiple: false
                },
                locate: true 
            }, function(err) {
                if (err) {
                    console.error("Erro ao iniciar o Quagga:", err);
                    resultElement.innerText = "Erro ao acessar a câmera.";
                    return;
                }
                console.log("Quagga inicializado em alta resolução.");
                Quagga.start();
            });

            // Processamento do resultado detectado
            Quagga.onDetected((data) => {
                const code = data.codeResult.code;

                if (code === lastResult) {
                    countSameResult++;
                } else {
                    lastResult = code;
                    countSameResult = 0;
                }

                // Ajustado para 2 leituras idênticas consecutivas devido à maior nitidez
                if (countSameResult >= 2) {
                    resultElement.innerText = code;
                    
                    // Feedback visual rápido (borda fica verde)
                    const container = document.getElementById('scanner-container');
                    container.style.borderColor = '#2e7d32';
                    setTimeout(() => container.style.borderColor = '#333', 500);
                }
            });

            // Renderização das linhas de marcação verde na tela
            Quagga.onProcessed((result) => {
                const drawingCtx = Quagga.canvas.ctx.overlay;
                const drawingCanvas = Quagga.canvas.dom.overlay;

                if (result) {
                    if (result.boxes) {
                        drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
                        result.boxes.filter(box => box !== result.box).forEach(box => {
                            Quagga.ImageDebug.drawPath(box, { x: 0, y: 1 }, drawingCtx, { color: "green", lineWidth: 2 });
                        });
                    }

                    if (result.box) {
                        Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: "#2e7d32", lineWidth: 2 });
                    }

                    if (result.codeResult && result.codeResult.code) {
                        Quagga.ImageDebug.drawPath(result.line, { x: 'x', y: 'y' }, drawingCtx, { color: 'red', lineWidth: 3 });
                    }
                }
            });
        });
    </script>
</body>
</html>
