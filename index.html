<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor de Código de Barras - Quagga2</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
        }

        /* Container do Scanner */
        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 320px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* O Quagga injeta a tag <video> e <canvas> aqui dentro automaticamente */
        #scanner-container video, 
        #scanner-container canvas.drawingBuffer {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Linha vermelha guia de mira (CSS Puro) */
        .scanner-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 2px;
            background-color: red;
            box-shadow: 0 0 8px red;
            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none; /* Não interfere no clique */
        }

        /* Container de resultados */
        #resultado {
            margin-top: 20px;
            width: 100%;
            max-width: 480px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .code-output {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2e7d32;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <h2>Leitor de Código de Barras (Quagga2)</h2>
    
    <div id="scanner-container">
        <div class="scanner-laser"></div>
    </div>

    <div id="resultado">
        <p>Aponte para um código de barras comercial</p>
        <div class="code-output" id="barcode-result">---</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

    <script>
        // Garante que o Quagga só inicia após o DOM carregar
        document.addEventListener("DOMContentLoaded", () => {
            
            const resultElement = document.getElementById('barcode-result');
            let lastResult = null;
            let countSameResult = 0;

            // Inicializando o Quagga2
            Quagga.init({
                inputStream: {
                    name: "Live",
                    type: "LiveStream",
                    target: document.querySelector('#scanner-container'), // Onde a câmera vai renderizar
                    constraints: {
                        width: 640,
                        height: 480,
                        facingMode: "environment" // Força o uso da câmera traseira do celular
                    },
                },
                locator: {
                    patchSize: "medium", // Tamanho do detector (medium é o mais equilibrado)
                    halfSample: true     // Processa em menor resolução para ganhar muita velocidade
                },
                numOfWorkers: navigator.hardwareConcurrency || 2, // Usa threads do processador para performance
                decoder: {
                    // Tipos de códigos que ele vai tentar ler (adicione mais se precisar)
                    readers: [
                        "ean_reader",      // Códigos de barras de produtos tradicionais (Supermercado)
                        "ean_8_reader",    // Versão menor do EAN
                        "code_128_reader", // Muito usado em logística e etiquetas de envio
                        "code_39_reader"   // Usado na indústria industrial
                    ]
                },
                locate: true // Ativa o localizador visual para achar o código mesmo torto
            }, function(err) {
                if (err) {
                    console.error("Erro ao iniciar o Quagga:", err);
                    resultElement.innerText = "Erro ao acessar a câmera.";
                    return;
                }
                console.log("Quagga inicializado com sucesso.");
                Quagga.start();
            });

            // Evento disparado a cada leitura bem sucedida
            Quagga.onDetected((data) => {
                const code = data.codeResult.code;

                // Validação simples de duplicidade para evitar leituras fantasmas (falsos positivos)
                if (code === lastResult) {
                    countSameResult++;
                } else {
                    lastResult = code;
                    countSameResult = 0;
                }

                // Só exibe se o leitor ler o mesmo código seguidamente por 3 vezes 
                // Isso resolve o problema clássico do Quagga de ler números errados por pressa
                if (countSameResult >= 3) {
                    resultElement.innerText = code;
                    
                    // Efeito visual rápido de sucesso no container
                    const container = document.getElementById('scanner-container');
                    container.style.borderColor = '#2e7d32';
                    setTimeout(() => container.style.borderColor = '#333', 500);
                }
            });

            // (Opcional) Desenha linhas verdes ao redor do código na tela enquanto detecta
            Quagga.onProcessed((result) => {
                const drawingCtx = Quagga.canvas.ctx.overlay;
                const drawingCanvas = Quagga.canvas.dom.overlay;

                if (result) {
                    if (result.boxes) {
                        drawingCtx.clearRect(0, 0, parseInt(drawingCanvas.getAttribute("width")), parseInt(drawingCanvas.getAttribute("height")));
                        result.boxes.filter(box => box !== result.box).forEach(box => {
                            Quagga.ImageDebug.drawPath(box, { x: 0, y: 1 }, drawingCtx, { color: "green", lineWidth: 2 });
                        });
                    }

                    if (result.box) {
                        Quagga.ImageDebug.drawPath(result.box, { x: 0, y: 1 }, drawingCtx, { color: "#2e7d32", lineWidth: 2 });
                    }

                    if (result.codeResult && result.codeResult.code) {
                        Quagga.ImageDebug.drawPath(result.line, { x: 'x', y: 'y' }, drawingCtx, { color: 'red', lineWidth: 3 });
                    }
                }
            });
        });
    </script>
</body>
</html>
