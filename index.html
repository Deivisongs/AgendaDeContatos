<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor Ultra-Sensível - ZXing 1.1</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 320px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
            transition: border-color 0.3s ease;
        }

        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            /* Filtro visual para o usuário */
            filter: contrast(140%) brightness(95%) saturate(0%);
        }

        .scanner-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 3px;
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none;
        }

        .scanner-overlay-top, .scanner-overlay-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 35%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 5;
            pointer-events: none;
        }
        .scanner-overlay-top { top: 0; border-bottom: 1px dashed rgba(255,255,255,0.4); }
        .scanner-overlay-bottom { bottom: 0; border-top: 1px dashed rgba(255,255,255,0.4); }

        #resultado {
            margin-top: 20px;
            width: 100%;
            max-width: 480px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .code-output {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2e7d32;
            word-break: break-all;
        }

        .dica {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h2>Leitor de Alta Performance (ZXing) 1.1</h2>
    
    <div id="scanner-container">
        <video id="preview"></video>
        <div class="scanner-overlay-top"></div>
        <div class="scanner-laser"></div>
        <div class="scanner-overlay-bottom"></div>
    </div>

    <div id="resultado">
        <p>Posicione o código de barras na linha vermelha</p>
        <div class="code-output" id="barcode-result">---</div>
        <p class="dica">
            <strong>Filtro de Contraste Ativo:</strong><br>
            Melhor visualização para códigos desbotados. Mantenha o celular estável a 25 cm do produto.
        </p>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const resultElement = document.getElementById('barcode-result');
            const container = document.getElementById('scanner-container');
            const codeReader = new ZXing.BrowserMultiFormatReader();

            let ultimoCodigo = null;
            let leiturasIdenticas = 0;
            let throttleTimer = false;

            const constraints = {
                video: {
                    width: { min: 640, ideal: 1280 },
                    height: { min: 480, ideal: 720 },
                    facingMode: "environment",
                    advanced: [
                        { focusMode: "continuous" }
                    ]
                }
            };

            codeReader.decodeFromConstraints(constraints, 'preview', (result, err) => {
                if (result) {
                    const codigoDetectado = result.text;

                    if (codigoDetectado === ultimoCodigo) {
                        leiturasIdenticas++;
                    } else {
                        ultimoCodigo = codigoDetectado;
                        leiturasIdenticas = 0;
                    }

                    // Valida se leu o mesmo código 2 vezes seguidas
                    if (leiturasIdenticas >= 1) { 
                        
                        // Throttle para não atualizar o DOM desnecessariamente centenas de vezes
                        if (!throttleTimer) {
                            throttleTimer = true;
                            resultElement.innerText = codigoDetectado;
                            
                            // Feedback visual na borda
                            container.style.borderColor = '#2e7d32';
                            setTimeout(() => {
                                container.style.borderColor = '#333';
                                throttleTimer = false;
                            }, 800);
                        }
                    }
                }

                if (err) {
                    // Se não encontrou código no frame atual, limpa o contador para exigir fluidez
                    if (err instanceof ZXing.NotFoundException) {
                        leiturasIdenticas = 0;
                    } else {
                        console.error(err);
                    }
                }
            })
            .catch((err) => {
                console.error("Erro ao abrir a câmera:", err);
                resultElement.innerText = "Erro ao acessar a câmera.";
            });

            // Opcional: Desligar a câmera se o usuário sair da aba (evita gastar bateria)
            document.addEventListener("visibilitychange", () => {
                if (document.hidden) {
                    codeReader.reset();
                }
            });
        });
    </script>
</body>
</html>
