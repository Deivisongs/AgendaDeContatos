<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leitor Ultra-Sensível - ZXing</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #f5f5f5;
        }

        h2 {
            color: #333;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Container do Scanner */
        #scanner-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 320px;
            border: 4px solid #333;
            border-radius: 8px;
            overflow: hidden;
            background: #000;
        }

        /* O ZXing joga a imagem direto na tag video */
        #preview {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            /* FILTRO DE HARDWARE: Engana o sensor aumentando drasticamente o contraste das barras apagadas */
            filter: contrast(150%) brightness(90%) saturate(0%);
        }

        /* Linha vermelha guia de mira centralizada */
        .scanner-laser {
            position: absolute;
            top: 50%;
            left: 5%;
            width: 90%;
            height: 3px;
            background-color: #ff0000;
            box-shadow: 0 0 10px #ff0000;
            z-index: 10;
            transform: translateY(-50%);
            pointer-events: none;
        }

        /* Cortina escura para forçar o usuário a alinhar o código no centro */
        .scanner-overlay-top, .scanner-overlay-bottom {
            position: absolute;
            left: 0;
            width: 100%;
            height: 35%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 5;
            pointer-events: none;
        }
        .scanner-overlay-top { top: 0; border-bottom: 1px dashed rgba(255,255,255,0.4); }
        .scanner-overlay-bottom { bottom: 0; border-top: 1px dashed rgba(255,255,255,0.4); }

        /* Container de resultados */
        #resultado {
            margin-top: 20px;
            width: 100%;
            max-width: 480px;
            padding: 15px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            box-sizing: border-box;
            text-align: center;
        }

        .code-output {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2e7d32;
            word-break: break-all;
        }

        .dica {
            font-size: 0.85rem;
            color: #666;
            margin-top: 8px;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <h2>Leitor de Alta Performance (ZXing)</h2>
    
    <div id="scanner-container">
        <video id="preview"></video>
        <div class="scanner-overlay-top"></div>
        <div class="scanner-laser"></div>
        <div class="scanner-overlay-bottom"></div>
    </div>

    <div id="resultado">
        <p>Posicione o código de barras na linha vermelha</p>
        <div class="code-output" id="barcode-result">---</div>
        <p class="dica">
            <strong>Modo Super Contraste Ativo:</strong><br>
            Ideal para códigos desbotados, apagados ou folhas amassadas. Mantenha o celular estável a 25 cm do produto.
        </p>
    </div>

    <script src="https://unpkg.com/@zxing/library@latest"></script>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const resultElement = document.getElementById('barcode-result');
            const codeReader = new ZXing.BrowserMultiFormatReader();

            // Configuração customizada avançada de vídeo para o ZXing
            const constraints = {
                video: {
                    width: { min: 640, ideal: 1280 },
                    height: { min: 480, ideal: 720 },
                    facingMode: "environment",
                    advanced: [{ focusMode: "continuous" }]
                }
            };

            // Inicia o rastreamento contínuo da câmera
            codeReader.decodeFromConstraints(constraints, 'preview', (result, err) => {
                if (result) {
                    // Sucesso na leitura!
                    resultElement.innerText = result.text;
                    
                    // Feedback visual na borda
                    const container = document.getElementById('scanner-container');
                    container.style.borderColor = '#2e7d32';
                    setTimeout(() => container.style.borderColor = '#333', 600);
                }

                if (err && !(err instanceof ZXing.NotFoundException)) {
                    // Ignora erros normais de "código não encontrado no frame atual" para não travar
                    console.error(err);
                }
            })
            .catch((err) => {
                console.error("Erro ao abrir a câmera com ZXing:", err);
                resultElement.innerText = "Erro ao acessar a câmera.";
            });
        });
    </script>
</body>
</html>
